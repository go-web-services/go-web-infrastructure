auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: info

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2020-10-24
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

storage_config:
  tsdb_shipper:
    active_index_directory: /loki/tsdb-index
    cache_location: /loki/tsdb-cache
    cache_ttl: 24h
    resync_interval: 5m
    query_ready_num_days: 0

limits_config:
  allow_structured_metadata: false
  ingestion_rate_mb: 8
  ingestion_burst_size_mb: 16
  # Set via LOKI_LOG_RETENTION_DAYS in observability docker-compose; minimum 1d (Loki min 24h).
  retention_period: ${LOKI_LOG_RETENTION_DAYS:-7}d
  # Avoid querying (and showing) data beyond retention; should match retention period.
  max_query_lookback: ${LOKI_LOG_RETENTION_DAYS:-7}d

compactor:
  working_directory: /loki/compactor
  compaction_interval: 10m
  retention_enabled: true
  retention_delete_delay: 2h
  retention_delete_worker_count: 150
  delete_request_store: filesystem
